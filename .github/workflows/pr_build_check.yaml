name: PR Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Enforce title case
        run: |
          cd en/
          set -o pipefail
          node scripts/enforce-title-case.mjs --dry-run 2>&1 | tee title-case.log || {
            {
              echo "## Title-case violations"
              echo ""
              echo "The following values need title-case corrections."
              echo "Run \`node en/scripts/enforce-title-case.mjs\` locally and commit the result."
              echo ""
              echo '```'
              cat title-case.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY:-/dev/null}"
            exit 1
          }

      - name: Build Docusaurus site
        id: build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee en/build.log
        env:
          BASE_URL: /docs-integrator/

      - name: Check for pages not linked from the sidebar
        if: always()
        continue-on-error: true
        run: |
          cd en/
          node scripts/check-orphans.mjs
